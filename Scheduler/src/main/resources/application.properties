# ==========================================
# Application Identity
# ==========================================
spring.application.name=Scheduler
# C?ng ch?y module scheduler (ví d? 8085 ?? không trůng v?i các module khác)
server.port=8086

# ==========================================
# SQL DB Connection Config
# ==========================================
# Scheduler c?n k?t n?i DB ?? quét b?ng scheduled_notifications vŕ c?u hěnh chi?n d?ch
spring.datasource.url=jdbc:mysql://localhost:3306/notification_system
spring.datasource.username=lam
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Kafka Connection (Local Docker)
# ==========================================
spring.kafka.bootstrap-servers=127.0.0.1:9092

# ==========================================
# Kafka Producer Configs
# ==========================================
# Khác v?i EmailConsumer lŕ nh?n tin, Scheduler lŕ ng??i G?I tin vŕo Kafka
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# ??m b?o d? li?u g?i ?i ? d?ng JSON ?? các Processor có th? ??c ???c
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ==========================================
# Throttling & Business Logic Config
# ==========================================
# C?u hěnh "C? m?i l?n ch?y (quét DB) thě g?i t?i ?a bao nhięu tin"
app.scheduler.batch-size=500

# C?u hěnh khung gi? g?i m?c ??nh (n?u admin không cŕi ??t rięng cho chi?n d?ch)
app.scheduler.default-start-time=08:00
app.scheduler.default-end-time=21:00

