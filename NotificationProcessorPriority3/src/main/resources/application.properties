spring.application.name=NotificationProcessorPriority3
server.port=8085

# ==========================================
# SQL DB connection config
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/notification_system
spring.datasource.username=lam
spring.datasource.password=
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# Kafka Connection (Local Docker)
# ==========================================
spring.kafka.bootstrap-servers=127.0.0.1:9092

# ==========================================
# Consumer config (L?ng nghe t? API g?i sang)
# ==========================================
spring.kafka.consumer.group-id=group-priority-3
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ==========================================
# Producer configuration (G?i ti?p sang cho c·c Consumer)
# ==========================================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Gi? nguyÍn Partitioner t˘y ch?nh c?a b?n
spring.kafka.properties.partitioner.class=com.puneetchhabra.NotificationProcessorPriority2.config.CustomPartitioner